apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app: nginx-fusioncore
  name: nginx-fusioncore-deployment
spec:
  selector:
    matchLabels:
      app: nginx-fusioncore
  replicas: 1
  template:
    metadata:
      labels:
        app: nginx-fusioncore
        kubescape.io/user-defined-profile: fusioncore-profile
        kubescape.io/user-defined-network: fusioncore-network
    spec:
      containers:
      - name: nginx
        image: curlimages/curl:8.5.0
        command: ["sleep", "infinity"]
