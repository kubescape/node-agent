apiVersion: apps/v1
kind: Deployment
metadata:
  name: k8s-miner-deployment
  labels:
    app: k8s-miner
spec:
  replicas: 1
  selector:
    matchLabels:
      app: k8s-miner
  template:
    metadata:
      labels:
        app: k8s-miner
        kubescape.io/user-defined-profile: crypto2
    spec:
      containers:
      - name: k8s-miner
        image: docker.io/amitschendel/crypto-miner-1
        imagePullPolicy: Always
        resources:
          limits:
            cpu: "2"
            memory: "2Gi"
          requests:
            cpu: "1"
            memory: "1Gi"