apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app: nginx
  name: nginx-deployment
spec:
  selector:
    matchLabels:
      app: nginx
  replicas: 1
  template:
    metadata:
      labels:
        app: nginx
        kubescape.io/user-defined-profile: nginx-regex-profile
    spec:
      containers:
      - name: nginx
        image: curlimages/curl:8.5.0
        command: ["sleep", "infinity"]
