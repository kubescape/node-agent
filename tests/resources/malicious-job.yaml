apiVersion: batch/v1
kind: Job
metadata:
  name: malicious-app-job
  labels:
    app: malicious-app
spec:
  template:
    metadata:
      labels:
        app: malicious-app
    spec:
      hostIPC: true  # This enables IPC host mode (equivalent to --ipc="host")
      containers:
      - name: malicious-app
        # sourcecode: node-agent/tests/images/malicious-app
        image: quay.io/kubescape/node-agent:maliciousapp6
        imagePullPolicy: Always
        workingDir: /tmp
        command: ["/bin/sh", "-c"]
        args:
          - |
            sleep 190
            mkdir -p /var/lib/r0002-test
            echo r0002 >/var/lib/r0002-test/marker
            cat /var/lib/r0002-test/marker >/dev/null 2>&1 || true
            exec /malicious
        env:
          - name: WAIT_FOR_SIGTERM
            value: "true"
        securityContext:
          capabilities:
            add: ["IPC_OWNER"]
        volumeMounts:
          - mountPath: /podmount
            name: mount-for-alert
      restartPolicy: Never
      volumes:
      - name: mount-for-alert
        emptyDir: {}
  backoffLimit: 1
