apiVersion: apps/v1
kind: Deployment
metadata:
  name: s3-full-28
  labels:
    app: s3-full-28
spec:
  replicas: 1
  selector:
    matchLabels:
      app: s3-full-28
  template:
    metadata:
      labels:
        app: s3-full-28
    spec:
      containers:
        - name: c
          image: busybox
          command: ["sh", "-c"]
          # AWS S3 (52.216.0.0/15): fully observe the /28 52.216.1.0/28
          args:
            - "while true; do for i in $(seq 0 15); do nc -w 1 -z 52.216.1.$i 443 2>/dev/null; done; sleep 2; done"
