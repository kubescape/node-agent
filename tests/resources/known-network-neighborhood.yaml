##
## User-defined NetworkNeighborhood for Test_28.
##
## Referenced directly from a pod via the label:
##   kubescape.io/user-defined-network: fusioncore-network
##
## This resource does NOT carry "kubescape.io/managed-by: User" —
## the pod label is the sole linkage mechanism.
##
## Usage:
##   sed "s/{{NAMESPACE}}/$NS/g" known-network-neighborhood.yaml \
##     | kubectl apply -f -
##
apiVersion: spdx.softwarecomposition.kubescape.io/v1beta1
kind: NetworkNeighborhood
metadata:
  name: fusioncore-network
  namespace: "{{NAMESPACE}}"
spec:
  matchLabels:
    app: nginx-fusioncore
  containers:
  - name: nginx
    ingress: []
    egress:
    - identifier: fusioncore-ai
      type: external
      dnsNames:
      - "fusioncore.ai."
      ipAddress: "162.0.217.171"
      ports:
      - name: TCP-80
        protocol: TCP
        port: 80
      - name: TCP-443
        protocol: TCP
        port: 443
      - name: UDP-53
        protocol: UDP
        port: 53
    - identifier: cluster-dns
      type: internal
      dnsNames:
      - "kubernetes.default.svc.cluster.local."
      ports:
      - name: UDP-53
        protocol: UDP
        port: 53
