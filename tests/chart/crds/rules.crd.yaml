apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: rules.kubescape.io
spec:
  group: kubescape.io
  names:
    kind: Rules
    listKind: RulesList
    plural: rules
    singular: rule
  scope: Namespaced
  versions:
    - name: v1
      served: true
      storage: true
      schema:
        openAPIV3Schema:
          type: object
          properties:
            apiVersion:
              type: string
            kind:
              type: string
            metadata:
              type: object
            spec:
              type: object
              properties:
                rules:
                  type: array
                  items:
                    type: object
                    properties:
                      enabled:
                        type: boolean
                        description: "Whether the rule is enabled"
                      id:
                        type: string
                        description: "Unique identifier for the rule"
                      name:
                        type: string
                        description: "Name of the rule"
                      description:
                        type: string
                        description: "Description of the rule"
                      expressions:
                        type: object
                        properties:
                          message:
                            type: string
                            description: "Message expression"
                          uniqueId:
                            type: string
                            description: "Unique identifier expression"
                          ruleExpression:
                            type: array
                            items:
                              type: object
                              properties:
                                eventType:
                                  type: string
                                  description: "Type of event this expression handles"
                                expression:
                                  type: string
                                  description: "The rule expression string"
                              required:
                                - eventType
                                - expression
                        required:
                          - message
                          - uniqueId
                          - ruleExpression
                      profileDependency:
                        type: integer
                        enum: [0, 1, 2]
                        description: "Profile dependency level (0=Required, 1=Optional, 2=NotRequired)"
                      profileDataRequired:
                        type: object
                        description: "Per-rule profile fields required for rule-aware projection."
                        properties:
                          opens:
                            description: "Projection requirements for opened paths."
                            oneOf:
                              - type: string
                                enum: ["all"]
                              - type: array
                                minItems: 1
                                items:
                                  type: object
                                  properties:
                                    exact:
                                      type: string
                                    prefix:
                                      type: string
                                    suffix:
                                      type: string
                                    contains:
                                      type: string
                                  oneOf:
                                    - required: ["exact"]
                                    - required: ["prefix"]
                                    - required: ["suffix"]
                                    - required: ["contains"]
                          execs:
                            description: "Projection requirements for executed paths."
                            oneOf:
                              - type: string
                                enum: ["all"]
                              - type: array
                                minItems: 1
                                items:
                                  type: object
                                  properties:
                                    exact:
                                      type: string
                                    prefix:
                                      type: string
                                    suffix:
                                      type: string
                                    contains:
                                      type: string
                                  oneOf:
                                    - required: ["exact"]
                                    - required: ["prefix"]
                                    - required: ["suffix"]
                                    - required: ["contains"]
                          capabilities:
                            description: "Projection requirements for Linux capabilities."
                            oneOf:
                              - type: string
                                enum: ["all"]
                              - type: array
                                minItems: 1
                                items:
                                  type: object
                                  properties:
                                    exact:
                                      type: string
                                    prefix:
                                      type: string
                                    suffix:
                                      type: string
                                    contains:
                                      type: string
                                  oneOf:
                                    - required: ["exact"]
                                    - required: ["prefix"]
                                    - required: ["suffix"]
                                    - required: ["contains"]
                          syscalls:
                            description: "Projection requirements for syscalls."
                            oneOf:
                              - type: string
                                enum: ["all"]
                              - type: array
                                minItems: 1
                                items:
                                  type: object
                                  properties:
                                    exact:
                                      type: string
                                    prefix:
                                      type: string
                                    suffix:
                                      type: string
                                    contains:
                                      type: string
                                  oneOf:
                                    - required: ["exact"]
                                    - required: ["prefix"]
                                    - required: ["suffix"]
                                    - required: ["contains"]
                          endpoints:
                            description: "Projection requirements for HTTP endpoints."
                            oneOf:
                              - type: string
                                enum: ["all"]
                              - type: array
                                minItems: 1
                                items:
                                  type: object
                                  properties:
                                    exact:
                                      type: string
                                    prefix:
                                      type: string
                                    suffix:
                                      type: string
                                    contains:
                                      type: string
                                  oneOf:
                                    - required: ["exact"]
                                    - required: ["prefix"]
                                    - required: ["suffix"]
                                    - required: ["contains"]
                          egressDomains:
                            description: "Projection requirements for egress domains."
                            oneOf:
                              - type: string
                                enum: ["all"]
                              - type: array
                                minItems: 1
                                items:
                                  type: object
                                  properties:
                                    exact:
                                      type: string
                                    prefix:
                                      type: string
                                    suffix:
                                      type: string
                                    contains:
                                      type: string
                                  oneOf:
                                    - required: ["exact"]
                                    - required: ["prefix"]
                                    - required: ["suffix"]
                                    - required: ["contains"]
                          egressAddresses:
                            description: "Projection requirements for egress IP addresses."
                            oneOf:
                              - type: string
                                enum: ["all"]
                              - type: array
                                minItems: 1
                                items:
                                  type: object
                                  properties:
                                    exact:
                                      type: string
                                    prefix:
                                      type: string
                                    suffix:
                                      type: string
                                    contains:
                                      type: string
                                  oneOf:
                                    - required: ["exact"]
                                    - required: ["prefix"]
                                    - required: ["suffix"]
                                    - required: ["contains"]
                          ingressDomains:
                            description: "Projection requirements for ingress domains."
                            oneOf:
                              - type: string
                                enum: ["all"]
                              - type: array
                                minItems: 1
                                items:
                                  type: object
                                  properties:
                                    exact:
                                      type: string
                                    prefix:
                                      type: string
                                    suffix:
                                      type: string
                                    contains:
                                      type: string
                                  oneOf:
                                    - required: ["exact"]
                                    - required: ["prefix"]
                                    - required: ["suffix"]
                                    - required: ["contains"]
                          ingressAddresses:
                            description: "Projection requirements for ingress IP addresses."
                            oneOf:
                              - type: string
                                enum: ["all"]
                              - type: array
                                minItems: 1
                                items:
                                  type: object
                                  properties:
                                    exact:
                                      type: string
                                    prefix:
                                      type: string
                                    suffix:
                                      type: string
                                    contains:
                                      type: string
                                  oneOf:
                                    - required: ["exact"]
                                    - required: ["prefix"]
                                    - required: ["suffix"]
                                    - required: ["contains"]
                      severity:
                        type: integer
                        description: "Severity level of the rule"
                      supportPolicy:
                        type: boolean
                        description: "Whether the rule supports rule policy enforcement"
                        default: false
                      tags:
                        type: array
                        items:
                          type: string
                        description: "Tags associated with the rule"
                      state:
                        type: object
                        additionalProperties: true
                        description: "State information for the rule"
                      agentVersionRequirement:
                        type: string
                        description: "Agent version requirement to evaluate this rule (supports semver ranges like ~1.0, >=1.2.0, etc.)"
                      isTriggerAlert:
                        type: boolean
                        description: "Whether the rule is a trigger alert"
                        default: true
                      mitreTechnique:
                        type: string
                        description: "MITRE technique associated with the rule"
                      mitreTactic:
                        type: string
                        description: "MITRE tactic associated with the rule"
                    required:
                      - enabled
                      - id
                      - name
                      - description
                      - expressions
                      - profileDependency
                      - severity
                      - supportPolicy
                      - isTriggerAlert
                      - mitreTechnique
                      - mitreTactic
              required:
                - rules
      subresources:
        status: {}
