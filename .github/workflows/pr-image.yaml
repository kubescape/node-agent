name: PR Image Build
on:
  workflow_dispatch:
    inputs:
      branch:
        description: "Branch to build from (defaults to the branch you select above)"
        type: string
        required: false

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-push-image:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Install inspektor-gadget (ig)
        run: curl -L https://github.com/inspektor-gadget/inspektor-gadget/releases/download/v0.48.1/ig_0.48.1_amd64.deb -o ig.deb && sudo dpkg -i ig.deb
      - name: Login to Quay.io
        uses: docker/login-action@v3
        with:
          registry: quay.io/kubescape
          username: ${{ secrets.QUAYIO_REGISTRY_USERNAME }}
          password: ${{ secrets.QUAYIO_REGISTRY_PASSWORD }}
      - name: Build gadgets, image, and push to Quay.io
        id: build-and-push-image
        run: |
          COMMIT_HASH=$(git rev-parse --short HEAD)
          export IMAGE_TAG=test-${COMMIT_HASH}
          export IMAGE_REPO=quay.io/kubescape/node-agent
          echo "image_repo=${IMAGE_REPO}" >> "$GITHUB_OUTPUT"
          echo "image_tag=${IMAGE_TAG}" >> "$GITHUB_OUTPUT"
          echo "🏗️ Building image: ${IMAGE_REPO}:${IMAGE_TAG}"
          make docker-push TAG=${IMAGE_TAG} IMAGE=${IMAGE_REPO}
          echo "✅ Image pushed: ${IMAGE_REPO}:${IMAGE_TAG}"
    outputs:
      image_tag: ${{ steps.build-and-push-image.outputs.image_tag }}
      image_repo: ${{ steps.build-and-push-image.outputs.image_repo }}
